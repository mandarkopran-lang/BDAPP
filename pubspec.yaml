name: breakdown_management_app
description: Multi-tenant Machine Breakdown Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.4

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^14.1.4

  # UI / UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  fluttertoast: ^8.2.5
  flutter_spinkit: ^5.2.1

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
